services:
  app:
    build:
      context: ../../
      dockerfile: formmate/mono-deploy/Dockerfile
    image: formcms-mono-deploy:latest
    ports:
      - "5000:5000" # Nginx Gateway
    environment:
      # --- FormCMS (.NET) Settings ---
      - DATABASE_PROVIDER=1 # 0=SQLite, 1=Postgres, 2=SqlServer, 3=MySQL
      - CONNECTION_STRING=Host=db;Port=5432;Database=cms;Username=postgres;Password=postgres;
      - MASTER_PASSWORD= # Empty - user sets via UI on first startup

      - DatabaseProvider=Postgres
      - "ConnectionStrings__Postgres=Host=db;Database=cms;Username=postgres;Password=postgres;"
      - ApiInfo__Url=http://localhost:5000
      - ASPNETCORE_URLS=http://+:5000

      # --- FormMate (Node.js) Settings ---
      - PORT=3001
      - NODE_ENV=production
      - FORMCMS_BASE_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost:5000/mate
      - DATABASE_URL=file:/app/packages/backend/data/sqlite.db

    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/packages/backend/data

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
  sqlite_data:
