<!-- FAQ Accordion Component -->
<!-- Each item has its own x-data for independent toggle -->
<section class="max-w-3xl mx-auto py-12">
    <h2 class="text-2xl font-bold text-gray-900 mb-8">Frequently Asked Questions</h2>

    <div class="divide-y divide-gray-200 border-t border-b border-gray-200">
        {{#each faqs}}
        <div x-data="{ open: false }">
            <button @click="open = !open" :aria-expanded="open"
                class="w-full flex items-center justify-between py-5 text-left group">
                <span
                    class="font-medium text-gray-900 group-hover:text-blue-600 transition-colors pr-4">{{this.question}}</span>
                <svg class="w-5 h-5 text-gray-400 flex-shrink-0 transition-transform duration-300"
                    :class="open ? 'rotate-180 text-blue-600' : ''" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div x-show="open" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1"
                class="overflow-hidden">
                <div class="pb-5 text-gray-600 leading-relaxed">{{{this.answer}}}</div>
            </div>
        </div>
        {{/each}}
    </div>
</section>
