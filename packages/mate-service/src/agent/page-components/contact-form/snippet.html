<!-- Contact Form Component -->
<!-- Submits to POST /api/forms/{formName} as JSON -->
<section class="max-w-2xl mx-auto">
    <div x-data="{
        form: { name: '', email: '', subject: '', message: '' },
        status: 'idle',
        errorMsg: '',
        async submit() {
            this.status = 'sending';
            this.errorMsg = '';
            try {
                const res = await fetch('/api/entities/contact/insert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form)
                });
                if (res.ok) {
                    this.status = 'sent';
                    this.form = { name: '', email: '', subject: '', message: '' };
                } else {
                    this.status = 'error';
                    this.errorMsg = 'Something went wrong. Please try again.';
                }
            } catch (e) {
                this.status = 'error';
                this.errorMsg = 'Network error. Please try again later.';
            }
        }
    }" class="bg-white rounded-2xl shadow-lg p-8">

        <h2 class="text-2xl font-bold text-gray-900 mb-6">Get in Touch</h2>

        <!-- Success Message -->
        <div x-show="status === 'sent'" x-transition
            class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg flex items-center gap-3">
            <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <p class="text-green-800 text-sm">Thank you! Your message has been sent successfully.</p>
        </div>

        <!-- Error Message -->
        <div x-show="status === 'error'" x-transition class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-800 text-sm" x-text="errorMsg"></p>
        </div>

        <form @submit.prevent="submit()" x-show="status !== 'sent'">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                    <input type="text" x-model="form.name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="Your name" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                    <input type="email" x-model="form.email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="you@example.com" />
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                <input type="text" x-model="form.subject"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="What's this about?" />
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Message *</label>
                <textarea x-model="form.message" required rows="5"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
                    placeholder="Your message..."></textarea>
            </div>

            <button type="submit" :disabled="status === 'sending'"
                class="w-full sm:w-auto px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <svg x-show="status === 'sending'" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                </svg>
                <span x-text="status === 'sending' ? 'Sending...' : 'Send Message'"></span>
            </button>
        </form>
    </div>
</section>
