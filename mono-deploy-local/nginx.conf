events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size __MAX_REQUEST_SIZE__;

    log_format debug_upstream '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log debug_upstream;

    ##
    # Upstreams
    ##
    upstream node_app {
        server 127.0.0.1:3001;
    }

    upstream dotnet_app {
        server 127.0.0.1:5001;
    }

    upstream mcp_server {
        server 127.0.0.1:3002;
    }

    ##
    # Shared proxy settings
    ##
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_cache_bypass $http_upgrade;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 5000;
        server_name localhost;
        absolute_redirect off;
        proxy_intercept_errors on;

        ##
        # Node.js UI & API (FormMate)
        ##
        location ~ ^/(mate|admin|portal|stash|mateapi|static)/ {
            proxy_pass http://node_app;
        }

        ##
        # .NET Static Assets (FormCMS)
        ##
        location ~ ^/files/ {
            proxy_pass http://dotnet_app;
        }

        ##
        # .NET API
        ##
        location /api/ {
            proxy_pass http://dotnet_app;
            error_page 502 = @restarting;
        }

        ##
        # MCP Server (AI tool integration)
        ##
        location /mcp/ {
            proxy_intercept_errors off;
            proxy_pass http://mcp_server;

            # SSE requires these settings
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Chunked transfer for SSE
            chunked_transfer_encoding on;

            # Pass standard headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass Authorization header through for API key auth
            proxy_set_header Authorization $http_authorization;
        }

        ##
        # Main .NET App (FormCMS)
        ##
        location / {
            proxy_pass http://dotnet_app;
        }

        ##
        # Custom error handling
        ##
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location @restarting {
            add_header Retry-After 3 always;
            return 503 "The system is restarting configuration. Please refresh in a few seconds.";
        }
    }
}
